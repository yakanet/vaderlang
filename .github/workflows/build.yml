name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  dist:
    name: Build distributable archives
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile all targets
        run: bun run dist:all

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: vader-archives-${{ github.run_id }}
          path: |
            dist/vader-*.tar.gz
            dist/vader-*.zip
          if-no-files-found: error
          retention-days: 30
