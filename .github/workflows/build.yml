name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel superseded runs on the same ref — except for tags, where the build
# usually feeds a release and shouldn't be aborted by a follow-up push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # Bun-free cold-start guarantee (§2.8): a stock C compiler + gzip turn the
  # committed C seed into the full compiler via the 3-stage bootstrap — no Bun,
  # no TypeScript, no pre-existing vader. This job deliberately does NOT install
  # Bun ; that is the whole point. See docs/BOOTSTRAP.md.
  seed-rebuild:
    name: Rebuild compiler from C seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # bootstrap/build.sh: gunzip the seed -> cc stage0, stage0 -> stage1,
      # stage1 -> build/vader (stage2). GC arenas auto-grow — no tuning needed.
      - name: Build the full compiler from the seed
        run: bash bootstrap/build.sh

      - name: Smoke test the rebuilt compiler
        run: ./build/vader build tests/snippets/return_42/_main.vader --target=c --out=build/_smoke.c

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Build the compiler under test from the committed C seed — no TS. This is
      # the §2.8 path: once src/ is deleted, the seed is the only way to get a
      # vader binary. bootstrap/build.sh runs the full 3-stage bootstrap and
      # leaves the compiler at build/vader. GC arenas auto-grow — no tuning needed.
      - name: Build Vader CLI from the C seed (used by tests)
        run: bash bootstrap/build.sh

      # --only-failures: hide passing tests, keep the log to failures + summary
      # (the local `bun run test` stays verbose for interactive use).
      - name: Test
        run: bun run test --only-failures

  # Real Windows build + test. Faithful (unlike wine) and a regression guard for
  # the Windows-specific surface (CRLF stdio, path separators, the runtime).
  # `continue-on-error` while the suite is still red on Windows — it reports the
  # real diffs without blocking PRs ; flip it off once green.
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # `${{ env.BUN_INSTALL }}` (exported by setup-bun) resolves the cache dir
      # correctly on every platform — the bare `~/.bun/install/cache` path
      # aborts the job on Windows runners.
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_INSTALL }}/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # bootstrap/build.ps1 needs a mingw-w64 gcc on PATH — MSVC is unsupported
      # (the runtime uses `__attribute__((weak))`). If this path is wrong on the
      # runner image, the `gcc --version` step below fails loudly ; adjust then.
      - name: Set up mingw-w64
        shell: pwsh
        run: |
          choco install mingw --no-progress -y
          echo "C:\ProgramData\mingw64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Verify gcc on PATH
        shell: pwsh
        run: gcc --version

      # 3-stage bootstrap from the committed C seed (PowerShell entry point).
      - name: Build Vader CLI from the C seed (Windows)
        shell: pwsh
        run: pwsh bootstrap/build.ps1

      - name: Test
        run: bun run test --only-failures

  # Heavy fixed-point check: build the toolchain, confirm stage1 and stage2 emit
  # identical C for main.vader, and the committed seed is fresh. Bun-free, gated
  # to manual dispatch / release tags — too slow for every PR. docs/BOOTSTRAP.md Phase 4.
  fixed-point:
    name: Fixed-point verification
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: verify.sh (stage1 == stage2 + seed freshness)
        run: bash bootstrap/verify.sh
