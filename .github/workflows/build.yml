name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Cancel superseded runs on the same ref — except for tags, where the build
# usually feeds a release and shouldn't be aborted by a follow-up push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Build the compiler under test from the committed C seed — no TS. This is
      # the §2.8 path: once src/ is deleted, the seed is the only way to get a
      # vader binary. stage1 (build-only) emits the full compiler's C, then cc.
      # GC arenas raised so stage1 doesn't OOM on self-input (docs/BOOTSTRAP.md §9).
      - name: Build Vader CLI from the C seed (used by tests)
        env:
          VADER_GC_YOUNG_BYTES: 268435456
          VADER_GC_OLD_BYTES: 1073741824
        run: |
          bash bootstrap/build.sh
          ./build/stage1 vader/cli/main.vader build/main.c
          cc -O2 -o build/vader build/main.c runtime/c/vader_runtime.c -Iruntime/c -lm

      - name: Test
        run: bun run test

  dist:
    name: Build distributable archives
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile all targets
        run: bun run dist:all

      - name: Upload archives
        uses: actions/upload-artifact@v7
        with:
          name: vader-archives-${{ github.run_id }}
          path: |
            dist/vader-*.tar.gz
            dist/vader-*.zip
          if-no-files-found: error
          retention-days: 30
