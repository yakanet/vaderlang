name: Bootstrap

# Validates the committed C seed (bootstrap/bootstrap.c.gz) on every push: a
# stock C compiler turns the seed into stage1, stage1 rebuilds the full
# compiler from vader/cli/main.vader, and the rebuilt compiler compiles code.
# No Bun, no TypeScript, no pre-existing vader binary — only a C compiler and
# gzip. That is the whole point. See docs/BOOTSTRAP.md.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  rebuild:
    name: Rebuild compiler from C seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # bootstrap/build.sh runs the whole chain end to end: gunzip the seed,
      # cc -> stage1, stage1 rebuilds the full compiler from
      # vader/cli/main.vader, cc -> build/vader (+ a --version smoke test).
      # The GC arenas auto-grow, so no env tuning is needed.
      - name: Build the full compiler from the seed
        run: bash bootstrap/build.sh

      - name: Smoke test the rebuilt compiler
        run: ./build/vader build tests/snippets/return_42/_main.vader --target=c --out=build/_smoke.c

  fixed-point:
    name: Fixed-point verification
    runs-on: ubuntu-latest
    # Heavy: builds the full compiler via build.sh, then checks it reproduces
    # its own C (build/main.c == build/main2.c) and the committed seed
    # byte-for-byte. Too slow for every PR — run on demand and on release tags
    # only. See docs/BOOTSTRAP.md Phase 4.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: verify.sh (full build + self-reproduction + seed freshness)
        run: bash bootstrap/verify.sh
